name: excar
description: Live fuel consumption HUD for Nissan X-Trail T31 via ELM327 WiFi.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bluetooth_serial: ^0.4.0
  permission_handler: ^11.0.1
  shared_preferences: ^2.2.3
  wakelock_plus: ^1.1.6   # keep screen on while driving (1.1.x supports Dart 3.1)

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/excar.png"
  remove_alpha_ios: true
  # Adaptive icon for Android 8+ (avoids the source being cropped to a circle)
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/excar.png"

flutter:
  uses-material-design: true
