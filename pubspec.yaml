name: obd2_hud
description: Live fuel consumption HUD for Nissan X-Trail T31 via ELM327 WiFi.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bluetooth_serial: ^0.4.0
  permission_handler: ^11.0.1
  shared_preferences: ^2.2.3
  wakelock_plus: ^1.1.6   # keep screen on while driving (1.1.x supports Dart 3.1)

dev_dependencies:
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
