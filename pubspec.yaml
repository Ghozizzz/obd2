name: obd2_hud
description: Live fuel consumption HUD for Nissan X-Trail T31 via ELM327 WiFi.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  wakelock_plus: ^1.2.5   # keep screen on while driving

dev_dependencies:
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
